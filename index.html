<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FinanceCalcHub</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f4f7fb;
  color: #222;
}

header {
  background: #0d47a1;
  color: white;
  padding: 20px;
  text-align: center;
}

nav {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  background: #1565c0;
}

nav button {
  padding: 12px 18px;
  margin: 5px;
  border: none;
  cursor: pointer;
  background: white;
  color: #1565c0;
  font-weight: bold;
  border-radius: 5px;
}

nav button:hover {
  background: #e3f2fd;
}

.container {
  max-width: 800px;
  margin: 20px auto;
  padding: 20px;
  background: white;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

.section {
  display: none;
}

.active {
  display: block;
}

input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
}

button.calc {
  width: 100%;
  padding: 12px;
  background: #0d47a1;
  color: white;
  border: none;
  cursor: pointer;
  margin-top: 10px;
}

button.calc:hover {
  background: #1565c0;
}

.result {
  margin-top: 15px;
  font-weight: bold;
}
</style>
</head>

<body>

<header>
<h1>FinanceCalcHub</h1>
<p>Free Online Simple Financial Calculators</p>
</header>
  <a href="about.html">About</a>
<a href="contact.html">Contact</a>
<a href="privacy-policy.html">Privacy Policy</a>

<nav>
<button onclick="show('loan')">Loan</button>
<button onclick="show('compound')">Compound</button>
<button onclick="show('savings')">Savings</button>
<button onclick="show('roi')">ROI</button>
</nav>

<div class="container">

<!-- LOAN -->
<div id="loan" class="section active">
<h2>Loan Calculator</h2>
<input id="loanAmount" type="number" placeholder="Loan Amount"/>
<input id="interestRate" type="number" placeholder="Interest Rate %"/>
<input id="loanYears" type="number" placeholder="Loan Term (Years)"/>
<button class="calc" onclick="calcLoan()">Calculate</button>
<div class="result" id="loanResult"></div>
</div>

<!-- COMPOUND -->
<div id="compound" class="section">
<h2>Compound Interest</h2>
<input id="ciPrincipal" type="number" placeholder="Initial Investment"/>
<input id="ciRate" type="number" placeholder="Interest Rate %"/>
<input id="ciYears" type="number" placeholder="Years"/>
<button class="calc" onclick="calcCompound()">Calculate</button>
<div class="result" id="ciResult"></div>
</div>

<!-- SAVINGS -->
<div id="savings" class="section">
<h2>Savings Goal</h2>
<input id="goal" type="number" placeholder="Savings Goal"/>
<input id="current" type="number" placeholder="Current Savings"/>
<input id="monthly" type="number" placeholder="Monthly Contribution"/>
<input id="sRate" type="number" placeholder="Interest Rate %"/>
<button class="calc" onclick="calcSavings()">Calculate</button>
<div class="result" id="sResult"></div>
</div>

<!-- ROI -->
<div id="roi" class="section">
<h2>ROI Calculator</h2>
<input id="invest" type="number" placeholder="Initial Investment"/>
<input id="finalValue" type="number" placeholder="Final Value"/>
<button class="calc" onclick="calcROI()">Calculate</button>
<div class="result" id="roiResult"></div>
</div>

</div>

<script>
function show(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* Loan */
function calcLoan() {
  let P = +document.getElementById("loanAmount").value;
  let r = (+document.getElementById("interestRate").value)/100/12;
  let n = (+document.getElementById("loanYears").value)*12;

  let m = (P*r*Math.pow(1+r,n))/(Math.pow(1+r,n)-1);

  document.getElementById("loanResult").innerText =
    "Monthly Payment: " + m.toFixed(2);
}

/* Compound */
function calcCompound() {
  let P = +document.getElementById("ciPrincipal").value;
  let r = +document.getElementById("ciRate").value/100;
  let t = +document.getElementById("ciYears").value;

  let A = P * Math.pow((1 + r), t);

  document.getElementById("ciResult").innerText =
    "Future Value: " + A.toFixed(2);
}

/* Savings Goal */
function calcSavings() {
  let goal = +document.getElementById("goal").value;
  let current = +document.getElementById("current").value;
  let monthly = +document.getElementById("monthly").value;

  let months = (goal - current) / monthly;

  document.getElementById("sResult").innerText =
    "Estimated Months: " + Math.ceil(months);
}

/* ROI */
function calcROI() {
  let i = +document.getElementById("invest").value;
  let f = +document.getElementById("finalValue").value;

  let roi = ((f - i) / i) * 100;

  document.getElementById("roiResult").innerText =
    "ROI: " + roi.toFixed(2) + "%";
}
</script>

</body>
</html>
